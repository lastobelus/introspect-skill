name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install '.[test]'
      - run: python -m py_compile introspect_skill/*.py scripts/*.py tests/*.py evals/*.py
      - run: python -m pytest
      - run: python evals/run_smoke.py
